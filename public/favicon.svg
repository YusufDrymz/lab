<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="lab">
  <!--
    A partition log with one record in it: three lanes, one bright block moving
    through the middle one. It has to read at 16px, so there is no lettering and
    no detail below ~4px — the only thing that must survive is the contrast
    between the dim lanes and the accent record.
  -->
  <rect width="64" height="64" rx="14" fill="#0d1117"/>
  <g fill="#3d4658">
    <rect x="12" y="17" width="40" height="7" rx="3.5"/>
    <rect x="12" y="28.5" width="40" height="7" rx="3.5"/>
    <rect x="12" y="40" width="40" height="7" rx="3.5"/>
  </g>
  <rect x="27" y="28.5" width="14" height="7" rx="3.5" fill="#00add8"/>
</svg>
